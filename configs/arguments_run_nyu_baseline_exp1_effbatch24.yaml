# NYU Baseline (B: paper-style) — Swin-L + depth decoder only, no text path (baseline_arch=True)
# eff batch = 12 * 2 * 1 = 24 → epoch당 optimizer step 수 동일
#
# 학습: torchrun --nproc_per_node=2 src/train.py configs/arguments_run_nyu_baseline_exp1_effbatch24.yaml --use_ddp
# Eval 시 반드시 baseline_arch 사용: eval config에 baseline_arch: true 추가 또는 CLI --baseline_arch
# 단일 gpu 학습 : python src/train.py configs/arguments_run_nyu_baseline_exp1_effbatch24.yaml 2>&1 | tee runs/train_nyu_train_baseline_exp1_effbatch24_$(date +%Y%m%d_%H%M).log

# 수정할 것: model_name, gpu_ids, accumulation_steps

# config
mode: train
model_name: nyu_train_baseline_exp1_effbatch24
dataset: nyu
data_path: ./data/nyu_v2_sync
gt_path: ./data/nyu_v2_sync
filenames_file: ./data_splits/nyudepthv2_train_split.txt
pretrain: ./swin_large_patch4_window12_384_22k.pth

baseline_mode: true

# hyperparameters (eff batch 24: 12 * 2 GPU * 1 accum)
depth_scale: 6553.5
max_depth: 10
batch_size: 12
num_epochs: 50
accumulation_steps: 1
learning_rate: 3e-5
end_learning_rate: 1e-5
lr_schedule: cosine
weight_decay: 0.0
adam_eps: 1e-6
num_threads: 16
input_height: 480
input_width: 640
do_random_rotate: true
degree: 2.5

# logging / validation
log_directory: ./runs/
log_freq: 50
min_depth_eval: 1e-3
max_depth_eval: 10
eigen_crop: true
do_online_eval: true
eval_freq: 3000
data_path_eval: ./data/nyu_v2_sync
gt_path_eval: ./data/nyu_v2_sync
filenames_file_eval: ./data_splits/nyudepthv2_val_split.txt
filenames_file_test: ./data_splits/nyudepthv2_test_split.txt

# Baseline: no KLD, no alter
weight_kld: 0.0
alter_prob: 0.0

use_amp: true
cache_images: true
gpu_ids: "3,4"

store_freq_epochs: 2.0
