# WorDepth NYU RSR eval config (NYU test + statistical_test relations)
# Run (repo root 기준):
#   python src/relational_eval_rsr.py @configs/arguments_eval_nyu_rsr.yaml
# 수정할 것 
# checkpoint_path, relations_dir_eval, gpu_ids

checkpoint_path: ./runs/nyu_train_baseline/model-12000-best_abs_rel_0.03285

dataset: nyu
data_path_eval: ./data/nyu_v2_sync
gt_path_eval: ./data/nyu_v2_sync
filenames_file_eval: ./data_splits/nyudepthv2_test_split.txt

depth_scale: 6553.5
input_height: 480
input_width: 640
max_depth: 10
min_depth_eval: 1e-3
max_depth_eval: 10

# Optional: GPU 선택 (없으면 기본 CUDA:0)
gpu_ids: "1"

# Relational annotation (NYU test, statistical representative 기준)
relations_dir_eval: ./data/nyu_relational/statistical_test

# RSR 설정: statistical representative (mu + alpha * sigma), alpha=1.0, margin=0.1
rel_repr: statistical
rel_statistical_alpha: 1.0
rel_margin: 0.5
rel_min_pixels: 20

viz_dir: runs/nyu_train_baseline/rsr_viz
viz_topk: 20