# Relational WorDepth NYU — Exp5: WorDepth + Relational (statistical, alpha=1.0, lambda=0.01, margin=0.0)
# - 목적: rel_weight(lambda)=0.01 설정에서 Relational WorDepth 성능 확인 (λ ablation)
#
# 실행 예시 (repo root 기준):
#   # 단일 GPU
#   python src/relational_train.py configs/arguments_run_nyu_wordepth_relational_exp5_effbatch24_stat_alpha10_lambda001_margin00.yaml 2>&1 | tee runs/train_nyu_train_wordepth_relational_exp5_effbatch24_stat_alpha10_lambda001_margin00_$(date +%Y%m%d_%H%M).log
#   # 다중 GPU (DDP)
#   torchrun --nproc_per_node=2 src/relational_train.py configs/arguments_run_nyu_wordepth_relational_exp5_effbatch24_stat_alpha10_lambda001_margin00.yaml --use_ddp 2>&1 | tee runs/train_nyu_train_wordepth_relational_exp5_effbatch24_stat_alpha10_lambda001_margin00_$(date +%Y%m%d_%H%M).log
#
# 꼭 수정할 것! 
# model_name, accumulation_steps, gpu_ids
#
# config
mode: train
model_name: nyu_train_wordepth_relational_exp5_effbatch24_stat_alpha10_lambda001_margin00
dataset: nyu
data_path: ./data/nyu_v2_sync
gt_path: ./data/nyu_v2_sync
filenames_file: ./data_splits/nyudepthv2_train_split.txt
pretrain: ./swin_large_patch4_window12_384_22k.pth

# hyperparameters (WorDepth paper exp2/exp4와 동일)
depth_scale: 6553.5
max_depth: 10
batch_size: 12
num_epochs: 50
accumulation_steps: 1
learning_rate: 3e-5
end_learning_rate: 1e-5
lr_schedule: cosine
weight_decay: 0.0
adam_eps: 1e-6
num_threads: 16
input_height: 480
input_width: 640
do_random_rotate: true
degree: 2.5

# logging / validation
log_directory: ./runs/
log_freq: 50
min_depth_eval: 1e-3
max_depth_eval: 10
eigen_crop: true
do_online_eval: true
eval_freq: 3000
data_path_eval: ./data/nyu_v2_sync
gt_path_eval: ./data/nyu_v2_sync
filenames_file_eval: ./data_splits/nyudepthv2_val_split.txt
filenames_file_test: ./data_splits/nyudepthv2_test_split.txt

# WorDepth 내부 설정
weight_kld: 1e-3
alter_prob: 0.5

# 실행환경
use_amp: true
cache_images: true
gpu_ids: "5,6"

# Relational (statistical, alpha=1.0, lambda=0.01, margin=0.0)
use_relational_loss: true
rel_weight: 0.01
rel_margin: 0.0
rel_repr: statistical
rel_statistical_alpha: 1.0
rel_min_pixels: 20
use_dense_depth: true
relations_dir_train: ./data/nyu_relational/statistical_train

store_freq_epochs: 2.0
compile: false
