# Relational WorDepth NYU — Exp0-B: Baseline + Relational (statistical, alpha=1.0, lambda=0.1, margin=0.5)
# - 목적: WorDepth Baseline (language prior X)에 object-level relational loss 추가
# - Baseline 정의: 이미지 인코더/디코더만 사용, text 브랜치/variational prior는 비활성화 (코드에서 별도 플래그로 처리 예정)
# - Rel loss 설정: repr=statistical, alpha=1.0, rel_weight=0.1, margin=0.5 (RSR eval과 동일 margin)
# - 사용 데이터: NYU Depth v2 (train/val/test split, dense depth)
#
# 실행 예시 (repo root 기준):
#   # 단일 GPU
#   python src/relational_train.py configs/arguments_run_nyu_baseline_relational_exp0_stat_margin05.yaml
#   # 다중 GPU (DDP)
#   torchrun --nproc_per_node=2 src/relational_train.py configs/arguments_run_nyu_baseline_relational_exp0_stat_margin05.yaml --use_ddp
#   # Tmux (단일):
#   python src/relational_train.py configs/arguments_run_nyu_baseline_relational_exp0_stat_margin05.yaml 2>&1 | tee runs/train_nyu_train_baseline_relational_exp0_stat_margin05_$(date +%Y%m%d_%H%M).log

# config
mode: train
model_name: nyu_train_baseline_relational_exp0_stat_margin05
dataset: nyu
data_path: ./data/nyu_v2_sync
gt_path: ./data/nyu_v2_sync
filenames_file: ./data_splits/nyudepthv2_train_split.txt
pretrain: ./swin_large_patch4_window12_384_22k.pth

# (선택) 코드에서 Baseline 모드 분기를 위해 사용할 힌트 플래그
baseline_mode: true


# hyperparameters
depth_scale: 6553.5
max_depth: 10
batch_size: 12
num_epochs: 50
accumulation_steps: 8
learning_rate: 3e-5
end_learning_rate: 1e-5
lr_schedule: cosine
weight_decay: 0.0
adam_eps: 1e-6
num_threads: 16
input_height: 480
input_width: 640
do_random_rotate: true
degree: 2.5


# logging / validation
log_directory: ./runs/
log_freq: 50
min_depth_eval: 1e-3
max_depth_eval: 10
eigen_crop: true
do_online_eval: true
eval_freq: 3000
data_path_eval: ./data/nyu_v2_sync
gt_path_eval: ./data/nyu_v2_sync
filenames_file_eval: ./data_splits/nyudepthv2_val_split.txt
filenames_file_test: ./data_splits/nyudepthv2_test_split.txt


# WorDepth 내부 설정 (Baseline + Rel: 언어 prior 비활성화)
weight_kld: 0.0
alter_prob: 0.0

# 실행환경
use_amp: true
cache_images: true
gpu_ids: "1"


# Relational (statistical, alpha=1.0, lambda=0.1, margin=0.5)
use_relational_loss: true
rel_weight: 0.1
rel_margin: 0.5
rel_repr: statistical
rel_statistical_alpha: 1.0
rel_min_pixels: 20
use_dense_depth: true
relations_dir_train: ./data/nyu_relational/statistical_train

store_freq_epochs: 2.0
